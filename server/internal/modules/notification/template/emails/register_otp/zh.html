{{define "subject"}}您的注册验证码{{end}}
{{define "body"}}
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 0;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#1a1a2e;padding:24px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;">Sovereign Fund</h1>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:32px 24px;">
              <h2 style="margin:0 0 16px;color:#333333;font-size:20px;">邮箱验证</h2>
              <p style="margin:0 0 24px;color:#555555;font-size:16px;line-height:1.5;">
                请使用以下验证码验证您的邮箱地址。此验证码将在 {{.ExpiresIn}} 后过期。
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:24px 0;">
                    <span style="display:inline-block;padding:16px 32px;background-color:#1a1a2e;color:#ffffff;font-size:32px;font-weight:bold;letter-spacing:8px;border-radius:8px;">{{.OTPCode}}</span>
                  </td>
                </tr>
              </table>
              <p style="margin:0;color:#999999;font-size:14px;text-align:center;">
                如果您未注册账户，请忽略此邮件。
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 24px;background-color:#f8f9fa;text-align:center;">
              <p style="margin:0;color:#999999;font-size:12px;">
                此邮件为系统自动发送，请勿回复。
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
{{end}}
