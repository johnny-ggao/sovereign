{{define "subject"}}{{.Amount}} {{.Currency}} 출금이 실패했습니다{{end}}
{{define "body"}}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 0;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#c0392b;padding:24px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;">Sovereign Fund</h1>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:32px 24px;">
              <h2 style="margin:0 0 16px;color:#c0392b;font-size:20px;">출금 실패</h2>
              <p style="margin:0 0 24px;color:#555555;font-size:16px;line-height:1.5;">
                죄송합니다. 출금을 처리할 수 없었습니다. 자금은 계정에 그대로 유지됩니다.
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8f9fa;border-radius:6px;">
                <tr>
                  <td style="padding:16px 20px;border-bottom:1px solid #e9ecef;">
                    <span style="color:#888888;font-size:14px;">금액</span><br>
                    <span style="color:#333333;font-size:18px;font-weight:bold;">{{.Amount}} {{.Currency}}</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 20px;">
                    <span style="color:#888888;font-size:14px;">실패 사유</span><br>
                    <span style="color:#c0392b;font-size:16px;">{{.Reason}}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 24px;background-color:#f8f9fa;text-align:center;">
              <p style="margin:0;color:#999999;font-size:12px;">
                본 메일은 자동 발송된 메일입니다. 회신하지 마세요.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
{{end}}
