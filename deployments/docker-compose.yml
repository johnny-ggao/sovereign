services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
      front:
        condition: service_started
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    env_file: ../.env
    environment:
      - SOVEREIGN_DATABASE_HOST=postgres
      - SOVEREIGN_DATABASE_PORT=5432
      - SOVEREIGN_REDIS_ADDR=redis:6379
    volumes:
      - ${CONFIG_DIR:-../server/config}/config.yaml:/app/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
    env_file: ../.env
    environment:
      - SOVEREIGN_DATABASE_HOST=postgres
      - SOVEREIGN_DATABASE_PORT=5432
      - SOVEREIGN_REDIS_ADDR=redis:6379
    volumes:
      - ${CONFIG_DIR:-../server/config}/config.yaml:/app/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  front:
    build:
      context: ../front
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - server
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.migrate
    env_file: ../.env
    environment:
      - SOVEREIGN_DATABASE_HOST=postgres
      - SOVEREIGN_DATABASE_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sovereign
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sovereign_dev}
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

